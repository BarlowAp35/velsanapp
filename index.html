<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VelsanApp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8eaf0;--text2:#8b92a8;--text3:#5a6180;--accent:#3b82f6;--accent2:#60a5fa;--green:#22c55e;--green2:#16a34a;--amber:#f59e0b;--red:#ef4444;--teal:#14b8a6;--purple:#a855f7;--radius:12px;--radius-sm:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-logo{font-size:28px;font-weight:600;margin-bottom:16px;}
.loading-logo span{color:var(--accent2);}
.loading-spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#auth-screen{min-height:100vh;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.12) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(168,85,247,0.08) 0%,transparent 60%),var(--bg);}
.auth-box{width:400px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:40px;animation:fadeUp .5s ease;}
.auth-logo{font-size:22px;font-weight:600;margin-bottom:6px;}
.auth-logo span{color:var(--accent2);}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.auth-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:14px;display:none;}
label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px;letter-spacing:.03em;}
input[type=text],input[type=password],input[type=email],input[type=number],input[type=date],select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius-sm);padding:10px 13px;font-family:inherit;font-size:14px;outline:none;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
.form-group{margin-bottom:14px;}
.btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
.btn:hover{background:var(--accent2);transform:translateY(-1px);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--bg4);}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.25);}
.btn-green{background:var(--green);}
.btn-green:hover{background:var(--green2);}
.btn-amber{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.3);}
.btn-sm{width:auto;padding:7px 14px;font-size:13px;}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);}
#app{display:none;height:100vh;flex-direction:column;}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;}
.topbar-logo{font-size:15px;font-weight:600;white-space:nowrap;}
.topbar-logo span{color:var(--accent2);}
.topbar-nav{display:flex;gap:2px;flex:1;overflow-x:auto;}
.topbar-nav::-webkit-scrollbar{display:none;}
.nav-btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.nav-btn:hover{background:var(--bg3);color:var(--text);}
.nav-btn.active{background:var(--bg3);color:var(--text);}
.nav-btn svg{width:14px;height:14px;flex-shrink:0;}
.topbar-user{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.page{display:none;flex:1;overflow-y:auto;padding:22px;}
.page.active{display:block;}
.page-title{font-size:18px;font-weight:600;margin-bottom:18px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.card-sm{padding:12px 14px;}
.stat-card{text-align:center;}
.stat-num{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px;}
.stat-green{color:var(--green);}
.stat-amber{color:var(--amber);}
.stat-red{color:var(--red);}
.stat-blue{color:var(--accent2);}
.stat-purple{color:var(--purple);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:14px;font-weight:600;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-green{background:rgba(34,197,94,0.12);color:var(--green);}
.badge-amber{background:rgba(245,158,11,0.12);color:var(--amber);}
.badge-red{background:rgba(239,68,68,0.12);color:var(--red);}
.badge-blue{background:rgba(59,130,246,0.12);color:var(--accent2);}
.badge-gray{background:rgba(255,255,255,0.07);color:var(--text3);}
.badge-teal{background:rgba(20,184,166,0.12);color:var(--teal);}
.badge-purple{background:rgba(168,85,247,0.12);color:var(--purple);}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:9px 12px;text-align:left;color:var(--text3);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);}
td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:520px;animation:fadeUp .2s ease;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.progress-bar-wrap{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s;}
.checkin-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.timer{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);}
#toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 16px;font-size:13px;z-index:2000;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;max-width:300px;}
#toast.show{transform:translateY(0);opacity:1;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);z-index:100;max-height:180px;overflow-y:auto;display:none;}
.autocomplete-list.open{display:block;}
.autocomplete-item{padding:9px 13px;font-size:13px;cursor:pointer;transition:background .15s;}
.autocomplete-item:hover{background:var(--bg4);}
.siparis-urun-row{display:grid;grid-template-columns:1fr 70px 90px 36px;gap:8px;align-items:center;margin-bottom:8px;}
.task-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;transition:border-color .2s;}
.task-card.high{border-left:3px solid var(--red);}
.task-card.medium{border-left:3px solid var(--amber);}
.task-card.low{border-left:3px solid var(--green);}
.task-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.task-check.done{background:var(--green);border-color:var(--green);}
.task-title{font-size:13px;font-weight:500;margin-bottom:3px;}
.task-title.done{text-decoration:line-through;color:var(--text3);}
.task-meta{font-size:11px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;}
@media(max-width:768px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:1fr 1fr;}.topbar-nav .nav-btn span{display:none;}.page{padding:14px;}}
@media(max-width:480px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-logo">Velsan<span>App</span></div>
  <div class="loading-spinner"></div>
</div>

<!-- AUTH -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">Velsan<span>App</span></div>
    <div class="auth-sub">Saha ekibi yönetim platformu</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="form-group"><label>E-posta</label><input type="email" id="login-email" placeholder="ornek@velsanapp.com" ></div>
    <div class="form-group"><label>Şifre</label><input type="password" id="login-pass" placeholder="••••••••"  onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn" id="login-btn" onclick="doLogin()">Giriş Yap</button>
    </div>
</div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Velsan<span>App</span></div>
    <div class="topbar-nav" id="nav-links"></div>
    <div class="topbar-user">
      <div class="avatar" id="topbar-avatar"></div>
      <div>
        <div id="topbar-name" style="font-size:12px;font-weight:500"></div>
        <div id="topbar-role" style="font-size:10px;color:var(--text3)"></div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="logout()" style="font-size:12px;padding:5px 10px">Çıkış</button>
    </div>
  </div>
  <div id="page-dashboard" class="page"></div>
  <div id="page-gorevler" class="page"></div>
  <div id="page-klinikler" class="page"></div>
  <div id="page-siparisler" class="page"></div>
  <div id="page-urunler" class="page"></div>
  <div id="page-raporlar" class="page"></div>
  <div id="page-personel" class="page"></div>
  <div id="page-saha" class="page"></div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-gorev">
  <div class="modal">
    <div class="modal-title">Görev Ekle</div>
    <input type="hidden" id="g-id">
    <div class="form-group"><label>Başlık</label><input type="text" id="g-baslik"></div>
    <div class="form-group"><label>Açıklama</label><textarea id="g-aciklama" rows="2"></textarea></div>
    <div class="grid-2">
      <div class="form-group"><label>Temsilci</label><select id="g-personel"></select></div>
      <div class="form-group"><label>Öncelik</label><select id="g-oncelik"><option value="high">Yüksek</option><option value="medium" selected>Orta</option><option value="low">Düşük</option></select></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Bölge</label><select id="g-bolge"></select></div>
      <div class="form-group"><label>Son Tarih</label><input type="date" id="g-tarih"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-gorev')">İptal</button>
      <button class="btn btn-sm" onclick="saveGorev()">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-klinik">
  <div class="modal">
    <div class="modal-title" id="klinik-modal-title">Klinik Kaydet</div>
    <input type="hidden" id="k-id">
    <div class="form-group">
      <label>Klinik Adı</label>
      <div class="autocomplete-wrap">
        <input type="text" id="k-ad" placeholder="Klinik adı yazın..." oninput="klinikAutocomplete(this.value)" onblur="setTimeout(closeAutocomplete,200)" autocomplete="off">
        <div class="autocomplete-list" id="k-autocomplete"></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Şehir</label><input type="text" id="k-sehir"></div>
      <div class="form-group"><label>İlçe</label><input type="text" id="k-ilce"></div>
    </div>
    <div class="form-group"><label>Adres</label><input type="text" id="k-adres"></div>
    <div class="grid-2">
      <div class="form-group"><label>Yetkili</label><input type="text" id="k-yetkili"></div>
      <div class="form-group"><label>Telefon</label><input type="text" id="k-tel"></div>
    </div>
    <div class="form-group"><label>Notlar</label><textarea id="k-notlar" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-klinik')">İptal</button>
      <button class="btn btn-sm" onclick="saveKlinik()">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-siparis">
  <div class="modal" style="max-width:580px">
    <div class="modal-title">Sipariş Formu</div>
    <input type="hidden" id="s-id">
    <div class="grid-2">
      <div class="form-group">
        <label>Klinik</label>
        <div class="autocomplete-wrap">
          <input type="text" id="s-klinik-input" placeholder="Klinik seç..." oninput="siparisKlinikAC(this.value)" onblur="setTimeout(closeSiparisAC,200)" autocomplete="off">
          <input type="hidden" id="s-klinik-id">
          <div class="autocomplete-list" id="s-klinik-ac"></div>
        </div>
      </div>
      <div class="form-group"><label>Tarih</label><input type="date" id="s-tarih"></div>
    </div>
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <label style="margin:0">Ürünler</label>
        <button class="btn btn-secondary btn-sm" onclick="addSiparisRow()">+ Ürün Ekle</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 70px 90px 36px;gap:8px;margin-bottom:4px">
        <span style="font-size:11px;color:var(--text3)">Ürün</span>
        <span style="font-size:11px;color:var(--text3)">Adet</span>
        <span style="font-size:11px;color:var(--text3)">Fiyat (₺)</span>
        <span></span>
      </div>
      <div id="siparis-rows"></div>
      <div style="text-align:right;margin-top:8px;font-size:14px;font-weight:600">Toplam: <span id="s-toplam" style="color:var(--green);font-family:'DM Mono',monospace">₺0</span></div>
    </div>
    <div class="form-group"><label>Not</label><textarea id="s-notlar" rows="2"></textarea></div>
    <div class="form-group"><label>Durum</label><select id="s-durum"><option value="bekliyor">Bekliyor</option><option value="onaylandi">Onaylandı</option><option value="gonderildi">Gönderildi</option><option value="teslim">Teslim Edildi</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-siparis')">İptal</button>
      <button class="btn btn-sm" onclick="saveSiparis()">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-urun">
  <div class="modal">
    <div class="modal-title" id="urun-modal-title">Ürün Ekle</div>
    <input type="hidden" id="u-id">
    <div class="form-group"><label>Ürün Adı</label><input type="text" id="u-ad"></div>
    <div class="form-group"><label>Ürün Kodu</label><input type="text" id="u-kod"></div>
    <div class="grid-2">
      <div class="form-group"><label>Kategori</label><input type="text" id="u-kategori"></div>
      <div class="form-group"><label>Birim Fiyat (₺)</label><input type="number" id="u-fiyat" min="0"></div>
    </div>
    <div class="grid-2">
      <div class="form-group"><label>Birim</label><select id="u-birim"><option>Adet</option><option>Kutu</option><option>Paket</option><option>Kg</option><option>Lt</option></select></div>
      <div class="form-group"><label>Stok</label><select id="u-stok"><option value="var">Var</option><option value="az">Az Kaldı</option><option value="yok">Yok</option></select></div>
    </div>
    <div class="form-group"><label>Açıklama</label><textarea id="u-aciklama" rows="2"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-urun')">İptal</button>
      <button class="btn btn-sm" onclick="saveUrun()">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-checkin">
  <div class="modal">
    <div class="modal-title" id="checkin-title">Sahaya Giriş</div>
    <div class="form-group"><label>Konum / Klinik</label><input type="text" id="ci-notlar" placeholder="Klinik veya adres..."></div>
    <div class="form-group"><label>Bölge</label><select id="ci-bolge"></select></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-checkin')">İptal</button>
      <button class="btn btn-green btn-sm" id="ci-btn" onclick="confirmCheckin()">Giriş Yap</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-personel">
  <div class="modal">
    <div class="modal-title">Personel Ekle</div>
    <div class="form-group"><label>Ad Soyad</label><input type="text" id="p-ad"></div>
    <div class="form-group"><label>E-posta</label><input type="email" id="p-email"></div>
    <div class="form-group"><label>Şifre</label><input type="password" id="p-sifre" placeholder="En az 6 karakter"></div>
    <div class="grid-2">
      <div class="form-group"><label>Bölge</label><select id="p-bolge"><option>Ege Bölgesi</option><option>İstanbul Avrupa</option><option>İstanbul Anadolu</option><option>Ankara Bölgesi</option></select></div>
      <div class="form-group"><label>Telefon</label><input type="text" id="p-tel"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="closeModal('modal-personel')">İptal</button>
      <button class="btn btn-sm" onclick="savePersonel()">Kaydet</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ==================== SUPABASE ====================
const SUPABASE_URL = 'https://tiqdkzwjojdyrwxdamoi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vjg_vibf6bMxRsc3CHCHJw_F86C2o5x';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==================== STATE ====================
const S = {
  user: null,        // auth user
  profil: null,      // kullanicilar tablosundaki profil
  kullanicilar: [],
  klinikler: [],
  urunler: [],
  siparisler: [],
  gorevler: [],
  checkins: [],
  bolgeler: ['Ege Bölgesi','İstanbul Avrupa','İstanbul Anadolu','Ankara Bölgesi'],
  checkinTimer: null,
  _siparisKlinikId: null,
};

// ==================== UTILS ====================
function showToast(msg, type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=type==='success'?'rgba(34,197,94,0.4)':type==='error'?'rgba(239,68,68,0.4)':'rgba(255,255,255,0.13)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function isAdmin(){return S.profil?.rol==='yönetici';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function gorevBadge(d){const m={bekliyor:'badge-amber',devam:'badge-blue',tamamlandi:'badge-green'};const l={bekliyor:'Bekliyor',devam:'Devam',tamamlandi:'Tamamlandı'};return`<span class="badge ${m[d]||'badge-gray'}"><span class="dot"></span>${l[d]||d}</span>`;}
function oncelikBadge(o){const m={high:'badge-red',medium:'badge-amber',low:'badge-green'};const l={high:'Yüksek',medium:'Orta',low:'Düşük'};return`<span class="badge ${m[o]||'badge-gray'}">${l[o]||o}</span>`;}
function sipBadge(d){const m={bekliyor:'badge-amber',onaylandi:'badge-blue',gonderildi:'badge-purple',teslim:'badge-green'};const l={bekliyor:'Bekliyor',onaylandi:'Onaylandı',gonderildi:'Gönderildi',teslim:'Teslim'};return`<span class="badge ${m[d]||'badge-gray'}"><span class="dot"></span>${l[d]||d}</span>`;}
function stokBadge(s){const m={var:'badge-green',az:'badge-amber',yok:'badge-red'};const l={var:'Stokta Var',az:'Az Kaldı',yok:'Stok Yok'};return`<span class="badge ${m[s]||'badge-gray'}">${l[s]||s}</span>`;}
function durumBadge(d){const m={aktif:'badge-green',izinli:'badge-amber',pasif:'badge-gray'};const l={aktif:'Aktif',izinli:'İzinli',pasif:'Pasif'};return`<span class="badge ${m[d]||'badge-gray'}"><span class="dot"></span>${l[d]||d}</span>`;}
function avatarColors(i){const c=[['rgba(59,130,246,0.2)','var(--accent2)'],['rgba(34,197,94,0.2)','var(--green)'],['rgba(245,158,11,0.2)','var(--amber)'],['rgba(168,85,247,0.2)','var(--purple)'],['rgba(20,184,166,0.2)','var(--teal)']];return c[i%c.length];}
function avatarHtml(profil,size=32,idx=0){const[bg,cl]=avatarColors(idx);return`<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size>34?13:11}px;background:${bg};color:${cl}">${profil?.avatar||'?'}</div>`;}
function klinikById(id){return S.klinikler.find(k=>k.id===id);}
function urunById(id){return S.urunler.find(u=>u.id===id);}
function profilById(id){return S.kullanicilar.find(k=>k.id===id);}
function siparisToplamHesapla(){
  let t=0;
  document.querySelectorAll('.s-row').forEach(r=>{
    const a=parseFloat(r.querySelector('.s-adet')?.value)||0;
    const f=parseFloat(r.querySelector('.s-fiyat')?.value)||0;
    t+=a*f;
  });
  const el=document.getElementById('s-toplam');
  if(el)el.textContent='₺'+t.toLocaleString('tr-TR');
}
function fillSelect(id, items, valKey, labelKey, selVal){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=items.map(i=>`<option value="${valKey?i[valKey]:i}" ${(valKey?i[valKey]:i)==selVal?'selected':''}>${labelKey?i[labelKey]:i}</option>`).join('');
}
function showLoading(show){
  document.getElementById('loading-screen').style.display=show?'flex':'none';
}

// ==================== AUTH ====================
async function init(){
  showLoading(true);
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    await loadUserSession(session.user);
  } else {
    showLoading(false);
    document.getElementById('auth-screen').style.display='flex';
  }
}

async function loadUserSession(user){
  S.user=user;
  const {data:profil}=await sb.from('kullanicilar').select('*').eq('id',user.id).single();
  S.profil=profil;
  await loadAllData();
  showLoading(false);
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  setupTopbar();
  setupNav();
  navigateTo(isAdmin()?'dashboard':'saha');
}



async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  const errEl=document.getElementById('auth-error');
  const btn=document.getElementById('login-btn');
  errEl.style.display='none';
  btn.disabled=true;btn.textContent='Giriş yapılıyor...';
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errEl.textContent='E-posta veya şifre hatalı';errEl.style.display='block';btn.disabled=false;btn.textContent='Giriş Yap';return;}
  await loadUserSession(data.user);
  btn.disabled=false;btn.textContent='Giriş Yap';
}

async function logout(){
  clearInterval(S.checkinTimer);
  await sb.auth.signOut();
  S.user=null;S.profil=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

// ==================== VERİ YÜKLEME ====================
async function loadAllData(){
  await Promise.all([
    loadKullanicilar(),
    loadKlinikler(),
    loadUrunler(),
    loadSiparisler(),
    loadGorevler(),
    loadCheckins(),
  ]);
}

async function loadKullanicilar(){
  const {data}=await sb.from('kullanicilar').select('*');
  S.kullanicilar=data||[];
}
async function loadKlinikler(){
  const {data}=await sb.from('klinikler').select('*').order('kayit_tarihi',{ascending:false});
  S.klinikler=data||[];
}
async function loadUrunler(){
  const {data}=await sb.from('urunler').select('*').order('ad');
  S.urunler=data||[];
}
async function loadSiparisler(){
  const {data}=await sb.from('siparisler').select('*, siparis_kalemleri(*)').order('created_at',{ascending:false});
  S.siparisler=data||[];
}
async function loadGorevler(){
  const {data}=await sb.from('gorevler').select('*').order('tarih');
  S.gorevler=data||[];
}
async function loadCheckins(){
  const {data}=await sb.from('checkins').select('*').eq('tarih',todayStr());
  S.checkins=data||[];
}

  const p=S.profil;
  if(!p)return;
  document.getElementById('topbar-name').textContent=p.ad;
  document.getElementById('topbar-role').textContent=isAdmin()?'⚙ Admin':`📍 ${p.bolge}`;
  const idx=S.kullanicilar.findIndex(k=>k.id===p.id);
  const[bg,cl]=avatarColors(idx);
  const av=document.getElementById('topbar-avatar');
  av.style.background=bg;av.style.color=cl;av.textContent=p.avatar||'?';

function setupNav(){
  const adminNav=[{id:'dashboard',label:'Dashboard'},{id:'gorevler',label:'Görevler'},{id:'klinikler',label:'Klinikler'},{id:'siparisler',label:'Siparişler'},{id:'urunler',label:'Ürünler'},{id:'raporlar',label:'Raporlar'},{id:'personel',label:'Personel'}];
  const personelNav=[{id:'saha',label:'Görevlerim'},{id:'klinikler',label:'Kliniklerim'},{id:'siparisler',label:'Siparişler'},{id:'raporlar',label:'Raporlarım'}];
  const navs=isAdmin()?adminNav:personelNav;
  document.getElementById('nav-links').innerHTML=navs.map(n=>`<div class="nav-btn" id="nav-${n.id}" onclick="navigateTo('${n.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${NAV_ICONS[n.id]||''}</svg><span>${n.label}</span></div>`).join('');
}

function navigateTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const pg=document.getElementById(`page-${page}`);if(!pg)return;
  pg.classList.add('active');
  const nb=document.getElementById(`nav-${page}`);if(nb)nb.classList.add('active');
  const renders={dashboard:renderDashboard,gorevler:renderGorevler,klinikler:renderKlinikler,siparisler:renderSiparisler,urunler:renderUrunler,raporlar:renderRaporlar,personel:renderPersonel,saha:renderSaha};
  if(renders[page])renders[page]();
}

// ==================== DASHBOARD ====================

  const tamam=S.gorevler.filter(g=>g.durum==='tamamlandi').length;
  const tamPct=S.gorevler.length?Math.round((tamam/S.gorevler.length)*100):0;

  document.getElementById('page-dashboard').innerHTML=`
    <div class="page-title">Dashboard</div>
    <div class="grid-4">
      <div class="card stat-card"><div class="stat-num stat-green">${checkedIn}</div><div class="stat-label">Sahada Aktif</div></div>
      <div class="card stat-card"><div class="stat-num stat-amber">${bekleyen}</div><div class="stat-label">Bekleyen Görev</div></div>

    </div>
    <div class="grid-2">
      <div class="card">
        <div class="section-header"><div class="section-title">Temsilci Durumları</div></div>
        ${S.kullanicilar.filter(k=>k.rol==='personel').map((k,i)=>{
          const ci=S.checkins.find(c=>c.personel_id===k.id&&!c.cikis);
          return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">${avatarHtml(k,30,i)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${k.ad}</div><div style="font-size:11px;color:var(--text3)">${k.bolge}</div></div>${ci?`<span class="badge badge-green"><span class="dot"></span>Sahada</span>`:`<span class="badge badge-gray">Ofiste</span>`}</div>`;

      <div class="card">

// ==================== GÖREVLER ====================
function renderGorevler(){
  const list=isAdmin()?S.gorevler:S.gorevler.filter(g=>g.personel_id===S.user.id);
  document.getElementById('page-gorevler').innerHTML=`
    <div class="section-header">
      <div class="page-title" style="margin-bottom:0">Görevler</div>
      ${isAdmin()?`<button class="btn btn-sm" onclick="openGorevModal()">+ Yeni Görev</button>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      <select onchange="filterGorevler()" id="gf-durum" style="width:auto;padding:7px 10px;font-size:12px"><option value="">Tüm Durumlar</option><option value="bekliyor">Bekliyor</option><option value="devam">Devam</option><option value="tamamlandi">Tamamlandı</option></select>
    </div>
    <div id="gorev-list">${renderGorevList(list)}</div>`;
}
function renderGorevList(list){
  if(!list.length)return'<div style="color:var(--text3);font-size:13px;padding:16px 0">Görev bulunamadı.</div>';
  return list.map(g=>{
    const p=profilById(g.personel_id);const done=g.durum==='tamamlandi';
    return`<div class="task-card ${g.oncelik}">
      <div class="task-check ${done?'done':''}" onclick="toggleGorev(${g.id},event)">${done?'<svg width="8" height="8" viewBox="0 0 10 10" fill="none"><path d="M2 5l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>
      <div style="flex:1"><div class="task-title ${done?'done':''}">${g.baslik}</div><div class="task-meta"><span>📍 ${g.bolge||''}</span><span>📅 ${g.tarih||''}</span>${p?`<span>👤 ${p.ad}</span>`:''} ${oncelikBadge(g.oncelik)} ${gorevBadge(g.durum)}</div>${g.aciklama?`<div style="font-size:11px;color:var(--text3);margin-top:4px">${g.aciklama}</div>`:''}</div>
      <div style="display:flex;gap:4px">
        ${g.durum!=='devam'&&!done?`<button class="btn btn-secondary btn-sm btn-icon" onclick="setGorevDurum(${g.id},'devam',event)">▶</button>`:''}
        ${!done?`<button class="btn btn-secondary btn-sm btn-icon" onclick="setGorevDurum(${g.id},'tamamlandi',event)">✓</button>`:''}
        ${isAdmin()?`<button class="btn btn-danger btn-sm btn-icon" onclick="deleteGorev(${g.id},event)">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
}
function filterGorevler(){
  const df=document.getElementById('gf-durum');
  let list=isAdmin()?S.gorevler:S.gorevler.filter(g=>g.personel_id===S.user.id);
  if(df?.value)list=list.filter(g=>g.durum===df.value);
  document.getElementById('gorev-list').innerHTML=renderGorevList(list);
}
async function toggleGorev(id,e){
  e.stopPropagation();
  const g=S.gorevler.find(g=>g.id===id);if(!g)return;
  const nd=g.durum==='tamamlandi'?'bekliyor':'tamamlandi';
  const {error}=await sb.from('gorevler').update({durum:nd}).eq('id',id);
  if(!error){g.durum=nd;showToast(nd==='tamamlandi'?'Tamamlandı ✓':'Yeniden açıldı','success');filterGorevler();}
}
async function setGorevDurum(id,durum,e){
  e.stopPropagation();
  const {error}=await sb.from('gorevler').update({durum}).eq('id',id);
  if(!error){const g=S.gorevler.find(g=>g.id===id);if(g)g.durum=durum;showToast('Güncellendi','success');filterGorevler();}
}
async function deleteGorev(id,e){
  e.stopPropagation();
  await sb.from('gorevler').delete().eq('id',id);
  S.gorevler=S.gorevler.filter(g=>g.id!==id);
  showToast('Silindi','success');renderGorevler();
}
function openGorevModal(){
  fillSelect('g-personel',S.kullanicilar.filter(k=>k.rol==='personel'),'id','ad');
  fillSelect('g-bolge',S.bolgeler);
  document.getElementById('g-tarih').value=todayStr();
  document.getElementById('g-baslik').value='';
  document.getElementById('g-aciklama').value='';
  openModal('modal-gorev');
}
async function saveGorev(){
  const b=document.getElementById('g-baslik').value.trim();if(!b){showToast('Başlık girin','error');return;}
  const {data,error}=await sb.from('gorevler').insert({baslik:b,aciklama:document.getElementById('g-aciklama').value.trim(),personel_id:document.getElementById('g-personel').value,oncelik:document.getElementById('g-oncelik').value,bolge:document.getElementById('g-bolge').value,tarih:document.getElementById('g-tarih').value,durum:'bekliyor'}).select().single();
  if(!error){S.gorevler.push(data);closeModal('modal-gorev');showToast('Görev eklendi ✓','success');renderGorevler();}
  else showToast('Hata: '+error.message,'error');
}

// ==================== KLİNİKLER ====================
function renderKlinikler(){
  document.getElementById('page-klinikler').innerHTML=`
    <div class="section-header">
      <div class="page-title" style="margin-bottom:0">Klinik Kayıtları</div>
      <div style="display:flex;gap:8px">
        ${isAdmin()?`<button class="btn btn-amber btn-sm" onclick="excelIndir('klinikler')">⬇ Excel</button>`:''}
        <button class="btn btn-sm" onclick="openKlinikModal()">+ Yeni Klinik</button>
      </div>
    </div>
    <div style="margin-bottom:14px"><input type="text" id="klinik-ara" placeholder="Klinik adı veya şehir ara..." oninput="filterKlinikler()" style="max-width:300px;padding:7px 10px;font-size:12px"></div>
    <div id="klinik-list">${renderKlinikList(S.klinikler)}</div>`;
}
function renderKlinikList(list){
  if(!list.length)return'<div style="color:var(--text3);font-size:13px;padding:16px 0">Klinik bulunamadı.</div>';
  return`<div class="table-wrap"><table><thead><tr><th>Klinik</th><th>Şehir/İlçe</th><th>Yetkili</th><th>Tel</th><th>Temsilci</th><th>Tarih</th><th></th></tr></thead><tbody>`+
  list.map(k=>{
    const t=profilById(k.temsilci_id);
    return`<tr>
      <td><div style="font-weight:500">${k.ad}</div>${k.notlar?`<div style="font-size:11px;color:var(--text3)">${k.notlar}</div>`:''}</td>
      <td>${k.sehir||''} / ${k.ilce||''}</td>
      <td>${k.yetkili||''}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${k.tel||''}</td>
      <td><span class="badge badge-blue" style="font-size:10px">${t?.bolge?.split(' ')[0]||''}</span></td>
      <td style="font-size:11px;color:var(--text3)">${k.kayit_tarihi||''}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-sm btn-icon" onclick="editKlinik(${k.id})">✎</button>
        <button class="btn btn-sm" style="margin-left:4px;font-size:11px" onclick="yeniSiparisKlinikten(${k.id})">+ Sipariş</button>
        ${isAdmin()?`<button class="btn btn-danger btn-sm btn-icon" style="margin-left:4px" onclick="deleteKlinik(${k.id})">✕</button>`:''}
      </td>
    </tr>`;
  }).join('')+'</tbody></table></div>';
}
function filterKlinikler(){
  const ara=document.getElementById('klinik-ara')?.value.toLowerCase()||'';
  const list=S.klinikler.filter(k=>!ara||k.ad.toLowerCase().includes(ara)||k.sehir?.toLowerCase().includes(ara)||k.ilce?.toLowerCase().includes(ara));
  document.getElementById('klinik-list').innerHTML=renderKlinikList(list);
}
function klinikAutocomplete(val){
  const list=document.getElementById('k-autocomplete');if(!val){list.classList.remove('open');return;}
  const matches=S.klinikler.filter(k=>k.ad.toLowerCase().includes(val.toLowerCase()));
  if(!matches.length){list.classList.remove('open');return;}
  list.innerHTML=matches.map(k=>`<div class="autocomplete-item" onmousedown="selectKlinikAC(${k.id})">${k.ad} — ${k.sehir}/${k.ilce}</div>`).join('');
  list.classList.add('open');
}
function closeAutocomplete(){document.getElementById('k-autocomplete')?.classList.remove('open');}
function selectKlinikAC(id){
  const k=S.klinikler.find(k=>k.id===id);if(!k)return;

  document.getElementById('k-ilce').value=k.ilce||'';
  document.getElementById('k-adres').value=k.adres||'';

  document.getElementById('k-tel').value=k.tel||'';
  document.getElementById('k-notlar').value=k.notlar||'';

function openKlinikModal(id){
  ['k-id','k-ad','k-sehir','k-ilce','k-adres','k-yetkili','k-tel','k-notlar'].forEach(i=>{ const el=document.getElementById(i);if(el)el.value='';});
  document.getElementById('klinik-modal-title').textContent='Klinik Kaydet';
  if(id){
    const k=S.klinikler.find(k=>k.id===id);if(!k)return;
    document.getElementById('k-id').value=k.id;
    document.getElementById('k-ad').value=k.ad;
    document.getElementById('k-sehir').value=k.sehir||'';
    document.getElementById('k-ilce').value=k.ilce||'';
    document.getElementById('k-adres').value=k.adres||'';
    document.getElementById('k-yetkili').value=k.yetkili||'';
    document.getElementById('k-tel').value=k.tel||'';
    document.getElementById('k-notlar').value=k.notlar||'';
    document.getElementById('klinik-modal-title').textContent='Klinik Düzenle';
  }
  openModal('modal-klinik');
}
function editKlinik(id){openKlinikModal(id);}
async function saveKlinik(){
  const ad=document.getElementById('k-ad').value.trim();if(!ad){showToast('Klinik adı girin','error');return;}
  const editId=document.getElementById('k-id').value;
  const data={ad,sehir:document.getElementById('k-sehir').value.trim(),ilce:document.getElementById('k-ilce').value.trim(),adres:document.getElementById('k-adres').value.trim(),yetkili:document.getElementById('k-yetkili').value.trim(),tel:document.getElementById('k-tel').value.trim(),notlar:document.getElementById('k-notlar').value.trim(),temsilci_id:S.user.id};
  if(editId){
    const {error}=await sb.from('klinikler').update(data).eq('id',parseInt(editId));
    if(!error){await loadKlinikler();closeModal('modal-klinik');showToast('Klinik güncellendi ✓','success');renderKlinikler();}
    else showToast('Hata: '+error.message,'error');
  } else {
    const {data:yeni,error}=await sb.from('klinikler').insert(data).select().single();
    if(!error){S.klinikler.unshift(yeni);closeModal('modal-klinik');showToast('Klinik kaydedildi ✓','success');renderKlinikler();}
    else showToast('Hata: '+error.message,'error');
  }
}
async function deleteKlinik(id){
  await sb.from('klinikler').delete().eq('id',id);
  S.klinikler=S.klinikler.filter(k=>k.id!==id);
  showToast('Silindi','success');renderKlinikler();
}

// ==================== SİPARİŞLER ====================
function renderSiparisler(){
  const list=isAdmin()?S.siparisler:S.siparisler.filter(s=>s.temsilci_id===S.user.id);
  const ciro=list.reduce((t,s)=>t+(s.siparis_kalemleri||[]).reduce((a,k)=>a+k.adet*k.birim_fiyat,0),0);
  document.getElementById('page-siparisler').innerHTML=`
    <div class="section-header">
      <div class="page-title" style="margin-bottom:0">Siparişler</div>
      <div style="display:flex;gap:8px">
        ${isAdmin()?`<button class="btn btn-amber btn-sm" onclick="excelIndir('siparisler')">⬇ Excel</button>`:''}
        <button class="btn btn-sm" onclick="openSiparisModal()">+ Yeni Sipariş</button>
      </div>
    </div>
    <div class="grid-3" style="margin-bottom:16px">
      <div class="card stat-card"><div class="stat-num stat-blue">${list.length}</div><div class="stat-label">Toplam</div></div>
      <div class="card stat-card"><div class="stat-num stat-amber">${list.filter(s=>s.durum==='bekliyor').length}</div><div class="stat-label">Bekliyor</div></div>
      <div class="card stat-card"><div class="stat-num stat-green" style="font-size:16px">₺${ciro.toLocaleString('tr-TR')}</div><div class="stat-label">Ciro</div></div>
    </div>
    <div style="margin-bottom:14px">
      <select onchange="filterSiparisler()" id="sf-durum" style="width:auto;padding:7px 10px;font-size:12px"><option value="">Tüm Durumlar</option><option value="bekliyor">Bekliyor</option><option value="onaylandi">Onaylandı</option><option value="gonderildi">Gönderildi</option><option value="teslim">Teslim</option></select>
    </div>
    <div id="siparis-list">${renderSiparisList(list)}</div>`;
}
function renderSiparisList(list){
  if(!list.length)return'<div style="color:var(--text3);font-size:13px;padding:16px 0">Sipariş yok.</div>';
  return`<div class="table-wrap"><table><thead><tr><th>#</th><th>Klinik</th><th>Ürünler</th><th>Toplam</th><th>Tarih</th><th>Durum</th><th></th></tr></thead><tbody>`+
  list.map(s=>{
    const k=klinikById(s.klinik_id);
    const top=(s.siparis_kalemleri||[]).reduce((a,k)=>a+k.adet*k.birim_fiyat,0);
    const urunStr=(s.siparis_kalemleri||[]).map(k=>{const u=urunById(k.urun_id);return`${u?.ad||'?'} x${k.adet}`;}).join(', ');
    return`<tr>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">#${s.id}</td>
      <td><div style="font-weight:500">${k?.ad||'?'}</div><div style="font-size:11px;color:var(--text3)">${k?.sehir||''}</div></td>
      <td style="font-size:11px;color:var(--text2);max-width:160px">${urunStr}</td>
      <td style="font-weight:600;color:var(--green);font-family:'DM Mono',monospace">₺${top.toLocaleString('tr-TR')}</td>
      <td style="font-size:11px;color:var(--text3)">${s.tarih||''}</td>
      <td>${sipBadge(s.durum)}</td>
      <td style="white-space:nowrap">
        ${isAdmin()?`<select onchange="setSiparisDurum(${s.id},this.value)" style="font-size:11px;padding:4px 6px;width:auto"><option value="bekliyor" ${s.durum==='bekliyor'?'selected':''}>Bekliyor</option><option value="onaylandi" ${s.durum==='onaylandi'?'selected':''}>Onaylandı</option><option value="gonderildi" ${s.durum==='gonderildi'?'selected':''}>Gönderildi</option><option value="teslim" ${s.durum==='teslim'?'selected':''}>Teslim</option></select>`:''}
        <button class="btn btn-danger btn-sm btn-icon" style="margin-left:4px" onclick="deleteSiparis(${s.id})">✕</button>
      </td>
    </tr>`;
  }).join('')+'</tbody></table></div>';
}
function filterSiparisler(){
  const df=document.getElementById('sf-durum');
  let list=isAdmin()?S.siparisler:S.siparisler.filter(s=>s.temsilci_id===S.user.id);
  if(df?.value)list=list.filter(s=>s.durum===df.value);
  document.getElementById('siparis-list').innerHTML=renderSiparisList(list);
}
async function setSiparisDurum(id,durum){
  await sb.from('siparisler').update({durum}).eq('id',id);
  const s=S.siparisler.find(s=>s.id===id);if(s)s.durum=durum;
  showToast('Durum güncellendi','success');
}
async function deleteSiparis(id){
  await sb.from('siparis_kalemleri').delete().eq('siparis_id',id);
  await sb.from('siparisler').delete().eq('id',id);
  S.siparisler=S.siparisler.filter(s=>s.id!==id);
  showToast('Silindi','success');renderSiparisler();
}
function siparisKlinikAC(val){
  const list=document.getElementById('s-klinik-ac');if(!val){list.classList.remove('open');return;}
  const myKlinikler=isAdmin()?S.klinikler:S.klinikler.filter(k=>k.temsilci_id===S.user.id);
  const matches=myKlinikler.filter(k=>k.ad.toLowerCase().includes(val.toLowerCase()));
  if(!matches.length){list.classList.remove('open');return;}
  list.innerHTML=matches.map(k=>`<div class="autocomplete-item" onmousedown="selectSiparisKlinik(${k.id})">${k.ad} — ${k.sehir}</div>`).join('');
  list.classList.add('open');
}
function closeSiparisAC(){document.getElementById('s-klinik-ac')?.classList.remove('open');}
function selectSiparisKlinik(id){const k=S.klinikler.find(k=>k.id===id);if(!k)return;S._siparisKlinikId=id;document.getElementById('s-klinik-input').value=k.ad;closeSiparisAC();}
function yeniSiparisKlinikten(kId){openSiparisModal();setTimeout(()=>{const k=S.klinikler.find(k=>k.id===kId);if(k){S._siparisKlinikId=kId;document.getElementById('s-klinik-input').value=k.ad;}},50);}
function openSiparisModal(){
  S._siparisKlinikId=null;
  document.getElementById('s-klinik-input').value='';
  document.getElementById('s-klinik-id').value='';
  document.getElementById('s-tarih').value=todayStr();
  document.getElementById('s-notlar').value='';
  document.getElementById('siparis-rows').innerHTML='';
  addSiparisRow();
  siparisToplamHesapla();
  openModal('modal-siparis');
}
function addSiparisRow(){
  const div=document.createElement('div');div.className='siparis-urun-row s-row';
  div.innerHTML=`<select class="s-urun" onchange="onSiparisUrunSec(this)">${S.urunler.map(u=>`<option value="${u.id}">${u.ad}</option>`).join('')}</select><input type="number" class="s-adet" value="1" min="1" oninput="siparisToplamHesapla()"><input type="number" class="s-fiyat" value="${S.urunler[0]?.fiyat||0}" min="0" oninput="siparisToplamHesapla()"><button class="btn btn-danger btn-icon" onclick="this.closest('.s-row').remove();siparisToplamHesapla()">✕</button>`;
  document.getElementById('siparis-rows').appendChild(div);siparisToplamHesapla();
}
function onSiparisUrunSec(sel){const u=urunById(parseInt(sel.value));if(u){sel.closest('.s-row').querySelector('.s-fiyat').value=u.fiyat;}siparisToplamHesapla();}
async function saveSiparis(){
  if(!S._siparisKlinikId){showToast('Klinik seçin','error');return;}
  const rows=document.querySelectorAll('.s-row');
  const kalemler=[];
  rows.forEach(r=>{const uId=parseInt(r.querySelector('.s-urun').value);const adet=parseInt(r.querySelector('.s-adet').value)||0;const fiyat=parseFloat(r.querySelector('.s-fiyat').value)||0;if(adet>0)kalemler.push({urun_id:uId,adet,birim_fiyat:fiyat});});
  if(!kalemler.length){showToast('Ürün ekleyin','error');return;}
  const {data:siparis,error}=await sb.from('siparisler').insert({klinik_id:S._siparisKlinikId,temsilci_id:S.user.id,tarih:document.getElementById('s-tarih').value,notlar:document.getElementById('s-notlar').value.trim(),durum:document.getElementById('s-durum').value}).select().single();
  if(error){showToast('Hata: '+error.message,'error');return;}
  const kalemlerData=kalemler.map(k=>({...k,siparis_id:siparis.id}));
  await sb.from('siparis_kalemleri').insert(kalemlerData);
  siparis.siparis_kalemleri=kalemlerData;
  S.siparisler.unshift(siparis);
  closeModal('modal-siparis');showToast('Sipariş kaydedildi ✓','success');renderSiparisler();
}

      <div style="text-align:right"><div style="font-size:16px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace">₺${(u.fiyat||0).toLocaleString('tr-TR')}</div><div style="margin-top:4px">${stokBadge(u.stok)}</div></div>

function openUrunModal(id){
  if(id){const u=S.urunler.find(u=>u.id===id);if(!u)return;document.getElementById('u-id').value=id;document.getElementById('u-ad').value=u.ad;document.getElementById('u-kod').value=u.kod||'';document.getElementById('u-kategori').value=u.kategori||'';document.getElementById('u-fiyat').value=u.fiyat||0;document.getElementById('u-birim').value=u.birim||'Adet';document.getElementById('u-stok').value=u.stok||'var';document.getElementById('u-aciklama').value=u.aciklama||'';document.getElementById('urun-modal-title').textContent='Ürünü Düzenle';}
  else{['u-id','u-ad','u-kod','u-kategori','u-fiyat','u-aciklama'].forEach(i=>document.getElementById(i).value='');document.getElementById('urun-modal-title').textContent='Yeni Ürün';}
  openModal('modal-urun');
}
async function saveUrun(){
  const ad=document.getElementById('u-ad').value.trim();if(!ad){showToast('Ürün adı girin','error');return;}
  const editId=document.getElementById('u-id').value;
  const data={ad,kod:document.getElementById('u-kod').value.trim(),kategori:document.getElementById('u-kategori').value.trim(),fiyat:parseFloat(document.getElementById('u-fiyat').value)||0,birim:document.getElementById('u-birim').value,stok:document.getElementById('u-stok').value,aciklama:document.getElementById('u-aciklama').value.trim()};
  if(editId){
    await sb.from('urunler').update(data).eq('id',parseInt(editId));
    const u=S.urunler.find(u=>u.id===parseInt(editId));if(u)Object.assign(u,data);
    showToast('Güncellendi ✓','success');
  } else {
    const {data:yeni}=await sb.from('urunler').insert(data).select().single();
    if(yeni)S.urunler.push(yeni);
    showToast('Ürün eklendi ✓','success');
  }
  closeModal('modal-urun');renderUrunler();
}
async function deleteUrun(id){
  await sb.from('urunler').delete().eq('id',id);
  S.urunler=S.urunler.filter(u=>u.id!==id);
  showToast('Silindi','success');renderUrunler();
}

// ==================== RAPORLAR ====================
function renderRaporlar(){
  const myS=isAdmin()?S.siparisler:S.siparisler.filter(s=>s.temsilci_id===S.user.id);
  const myG=isAdmin()?S.gorevler:S.gorevler.filter(g=>g.personel_id===S.user.id);
  const myK=isAdmin()?S.klinikler:S.klinikler.filter(k=>k.temsilci_id===S.user.id);
  const ciro=myS.reduce((t,s)=>t+(s.siparis_kalemleri||[]).reduce((a,k)=>a+k.adet*k.birim_fiyat,0),0);
  const tamam=myG.filter(g=>g.durum==='tamamlandi').length;
  const tamPct=myG.length?Math.round((tamam/myG.length)*100):0;
  document.getElementById('page-raporlar').innerHTML=`
    <div class="section-header">
      <div class="page-title" style="margin-bottom:0">Raporlar</div>
      ${isAdmin()?`<div style="display:flex;gap:8px"><button class="btn btn-amber btn-sm" onclick="excelIndir('klinikler')">⬇ Klinikler</button><button class="btn btn-amber btn-sm" onclick="excelIndir('siparisler')">⬇ Siparişler</button></div>`:''}
    </div>
    <div class="grid-4">
      <div class="card stat-card"><div class="stat-num stat-green">${tamam}</div><div class="stat-label">Tamamlanan Görev</div></div>
      <div class="card stat-card"><div class="stat-num stat-blue">${myK.length}</div><div class="stat-label">Kayıtlı Klinik</div></div>
      <div class="card stat-card"><div class="stat-num stat-purple">${myS.length}</div><div class="stat-label">Sipariş</div></div>
      <div class="card stat-card"><div class="stat-num stat-green" style="font-size:16px">₺${ciro.toLocaleString('tr-TR')}</div><div class="stat-label">Ciro</div></div>
    </div>
    ${isAdmin()?`<div class="card" style="margin-bottom:16px">
      <div class="section-title" style="margin-bottom:12px">Temsilci Performansı</div>
      <div class="table-wrap"><table><thead><tr><th>Temsilci</th><th>Klinik</th><th>Sipariş</th><th>Ciro</th><th>Görev Başarısı</th></tr></thead><tbody>
      ${S.kullanicilar.filter(k=>k.rol==='personel').map(p=>{
        const pg=S.gorevler.filter(g=>g.personel_id===p.id);
        const pt=pg.filter(g=>g.durum==='tamamlandi').length;
        const ps=S.siparisler.filter(s=>s.temsilci_id===p.id);
        const pk=S.klinikler.filter(k=>k.temsilci_id===p.id).length;
        const pc=ps.reduce((t,s)=>t+(s.siparis_kalemleri||[]).reduce((a,k)=>a+k.adet*k.birim_fiyat,0),0);
        const pp=pg.length?Math.round((pt/pg.length)*100):0;
        return`<tr><td><b>${p.ad}</b><div style="font-size:10px;color:var(--text3)">${p.bolge}</div></td><td>${pk}</td><td>${ps.length}</td><td style="color:var(--green);font-family:'DM Mono',monospace">₺${pc.toLocaleString('tr-TR')}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar-wrap" style="flex:1;min-width:60px"><div class="progress-bar-fill" style="width:${pp}%;background:${pp>70?'var(--green)':pp>40?'var(--amber)':'var(--red)'}"></div></div><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${pp}%</span></div></td></tr>`;
      }).join('')}</tbody></table></div>
    </div>`:''}
    <div class="grid-2">
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">Görev Dağılımı</div>
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text3)">Tamamlanma</span><span style="color:var(--green);font-weight:600">${tamPct}%</span></div>
        <div class="progress-bar-wrap" style="height:8px;margin-bottom:12px"><div class="progress-bar-fill" style="width:${tamPct}%;background:var(--green)"></div></div>
      </div>
      <div class="card">
        <div class="section-title" style="margin-bottom:10px">Sipariş Durumları</div>
        ${[['bekliyor','Bekliyor','var(--amber)'],['onaylandi','Onaylandı','var(--accent2)'],['gonderildi','Gönderildi','var(--purple)'],['teslim','Teslim','var(--green)']].map(([k,l,c])=>{
          const cnt=myS.filter(s=>s.durum===k).length;const pct=myS.length?Math.round((cnt/myS.length)*100):0;
          return`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--text2)">${l}</span><span style="color:${c}">${cnt}</span></div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
        }).join('')}

async function savePersonel(){
  const ad=document.getElementById('p-ad').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const sifre=document.getElementById('p-sifre').value.trim();
  if(!ad||!email||!sifre){showToast('Tüm alanları doldurun','error');return;}
  const {data,error}=await sb.auth.admin?.createUser({email,password:sifre,email_confirm:true});
  if(error){showToast('Kullanıcı oluşturulamadı: '+error.message,'error');return;}
  showToast('Personel eklendi ✓','success');
  closeModal('modal-personel');
}

// ==================== SAHA ====================
function renderSaha(){
  const ci=S.checkins.find(c=>c.personel_id===S.user.id&&!c.cikis);
  const myG=S.gorevler.filter(g=>g.personel_id===S.user.id);
  document.getElementById('page-saha').innerHTML=`
    <div class="page-title">Görevlerim</div>
    <div class="checkin-bar">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:3px">Bugünkü Durum</div>
        <div style="font-size:13px;font-weight:500;color:${ci?'var(--green)':'var(--text3)'}">
          ${ci?`✅ Sahada — ${ci.bolge} / ${ci.notlar||''}`:'⬜ Henüz giriş yapılmadı'}
        </div>
      </div>
      ${ci?`<div><div style="font-size:11px;color:var(--text3);margin-bottom:2px">Süre</div><div class="timer" id="elapsed-time">—</div></div>`:''}
      <div style="display:flex;gap:6px;margin-left:auto">
        ${ci?`<button class="btn btn-danger btn-sm" onclick="openCheckout()">⬛ Çıkış</button>`:`<button class="btn btn-green btn-sm" onclick="openCheckinModal()">▶ Sahaya Giriş</button>`}
      </div>
    </div>
    <div class="grid-3" style="margin-bottom:16px">
      <div class="card stat-card"><div class="stat-num stat-blue">${myG.length}</div><div class="stat-label">Toplam</div></div>
      <div class="card stat-card"><div class="stat-num stat-amber">${myG.filter(g=>g.durum==='bekliyor').length}</div><div class="stat-label">Bekleyen</div></div>
      <div class="card stat-card"><div class="stat-num stat-green">${myG.filter(g=>g.durum==='tamamlandi').length}</div><div class="stat-label">Tamamlanan</div></div>
    </div>
    <div class="section-title" style="margin-bottom:10px">Görevlerim</div>
    ${renderGorevList(myG)}`;
  if(ci)startTimer(ci.giris);
}
function openCheckinModal(){
  fillSelect('ci-bolge',S.bolgeler,null,null,S.profil?.bolge);
  document.getElementById('checkin-title').textContent='Sahaya Giriş';
  document.getElementById('ci-btn').textContent='Giriş Yap';
  document.getElementById('ci-btn').style.background='var(--green)';
  document.getElementById('ci-btn').onclick=confirmCheckin;
  document.getElementById('ci-notlar').value='';
  openModal('modal-checkin');
}
function openCheckout(){
  fillSelect('ci-bolge',S.bolgeler,null,null,S.profil?.bolge);
  document.getElementById('checkin-title').textContent='Sahadan Çıkış';
  document.getElementById('ci-btn').textContent='Çıkış Yap';
  document.getElementById('ci-btn').style.background='var(--red)';
  document.getElementById('ci-btn').onclick=confirmCheckout;
  openModal('modal-checkin');
}
async function confirmCheckin(){
  const now=new Date();const saat=now.toTimeString().slice(0,5);
  const {data,error}=await sb.from('checkins').insert({personel_id:S.user.id,giris:saat,bolge:document.getElementById('ci-bolge').value,notlar:document.getElementById('ci-notlar').value||S.profil?.bolge,tarih:todayStr()}).select().single();
  if(!error){S.checkins.push(data);closeModal('modal-checkin');showToast('Sahaya giriş ✓','success');renderSaha();}
  else showToast('Hata: '+error.message,'error');
}
async function confirmCheckout(){
  const ci=S.checkins.find(c=>c.personel_id===S.user.id&&!c.cikis);
  if(!ci)return;
  const now=new Date();const saat=now.toTimeString().slice(0,5);
  await sb.from('checkins').update({cikis:saat}).eq('id',ci.id);
  ci.cikis=saat;
  clearInterval(S.checkinTimer);
  closeModal('modal-checkin');showToast('Çıkış yapıldı','success');renderSaha();
}
function startTimer(giris){
  clearInterval(S.checkinTimer);
  const[h,m]=giris.split(':').map(Number);
  S.checkinTimer=setInterval(()=>{
    const now=new Date();
    const diff=(now.getHours()*60+now.getMinutes())-(h*60+m);
    const dh=Math.floor(Math.abs(diff)/60);const dm=Math.abs(diff)%60;
    const el=document.getElementById('elapsed-time');
    if(el)el.textContent=`${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}`;
  },15000);
}

// ==================== EXCEL ====================
function excelIndir(tip){
  if(!isAdmin()){showToast('Sadece admin indirebilir','error');return;}
  let rows=[];let fn='';
  if(tip==='klinikler'){
    fn='VelsanApp_Klinikler.csv';
    rows=[['Klinik Adı','Şehir','İlçe','Adres','Yetkili','Tel','Temsilci','Bölge','Kayıt Tarihi','Notlar']];
    S.klinikler.forEach(k=>{const t=profilById(k.temsilci_id);rows.push([k.ad,k.sehir||'',k.ilce||'',k.adres||'',k.yetkili||'',k.tel||'',t?.ad||'',t?.bolge||'',k.kayit_tarihi||'',k.notlar||'']);});
  } else {
    fn='VelsanApp_Siparisler.csv';
    rows=[['#','Klinik','Şehir','Temsilci','Bölge','Tarih','Ürünler','Toplam (₺)','Durum','Not']];
    S.siparisler.forEach(s=>{const k=klinikById(s.klinik_id);const t=profilById(s.temsilci_id);const top=(s.siparis_kalemleri||[]).reduce((a,k)=>a+k.adet*k.birim_fiyat,0);const us=(s.siparis_kalemleri||[]).map(k=>{const u=urunById(k.urun_id);return`${u?.ad||'?'} x${k.adet}`;}).join(' | ');rows.push([s.id,k?.ad||'',k?.sehir||'',t?.ad||'',t?.bolge||'',s.tarih||'',us,top,s.durum,s.notlar||'']);});
  }
  const BOM='\uFEFF';
  const csv=BOM+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);
  showToast('İndirildi ✓','success');
}

// Modal overlay kapat
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});});

// Başlat
init();
</script>
